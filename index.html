<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unknown Executor</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

:root {
    --bg: #0a0a0a;
    --text: #dcdcdc;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
}

body.light {
    --bg: #f5f5f5;
    --text: #111;
    --card: rgba(0,0,0,0.04);
    --border: rgba(0,0,0,0.08);
}

body {
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
}

/* 🌌 배경 애니메이션 */
.bg {
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #111, #1a1a1a, #111);
    animation: moveBg 15s linear infinite;
    z-index: -1;
}

body.light .bg {
    background: linear-gradient(45deg, #eaeaea, #ffffff, #eaeaea);
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    50% { transform: translate(-25%, -25%); }
    100% { transform: translate(0,0); }
}

/* 🔽 전체 아래로 내림 */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 140px 20px 60px;
    text-align: center;
}

/* 🔠 폰트 작게 */
h1 {
    font-size: 2rem;
    margin-bottom: 8px;
}

.subtitle {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 30px;
}

/* 🟢 상태 뱃지 */
.badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(0,255,100,0.1);
    color: #5cff9c;
    font-size: 0.75rem;
    margin-bottom: 20px;
    border: 1px solid rgba(0,255,100,0.2);
}

/* 🧊 카드 */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    backdrop-filter: blur(20px);
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 20px rgba(255,255,255,0.05);
}

.card h2 {
    font-size: 1.2rem;
    margin-bottom: 6px;
}

.card p {
    font-size: 0.8rem;
    color: #aaa;
}

/* 🔘 버튼 */
.btn {
    margin-top: 35px;
    display: inline-block;
    padding: 10px 24px;
    border-radius: 10px;
    background: var(--text);
    color: var(--bg);
    text-decoration: none;
    font-size: 0.85rem;
    transition: 0.2s;
}

.btn:hover {
    opacity: 0.8;
}

/* 🌙 토글 버튼 */
.toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    padding: 8px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="toggle" onclick="toggleTheme()">Toggle</div>

<div class="container">
    <div class="badge">● Undetected</div>

    <h1>Unknown</h1>
    <p class="subtitle">Next-generation Roblox Executor</p>

    <div class="cards">
        <div class="card">
            <h2>96%</h2>
            <p>UNC Support</p>
        </div>

        <div class="card">
            <h2>98%</h2>
            <p>sUNC Support</p>
        </div>

        <div class="card">
            <h2>Clean UI</h2>
            <p>Beginner Friendly</p>
        </div>

        <div class="card">
            <h2>1 sec</h2>
            <p>Fast Attach</p>
        </div>
    </div>

    <a href="#" class="btn">Download</a>
</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
